name: Build & Deploy to josh2112.com/rungoal

on:
    # Build when I push to master
    push:
        branches: [master]
    # Build manually (via Actions button)
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment: "josh2112.com (NFSN)"
        env:
            DEST_HOST: "${{ secrets.USERNAME }}@${{ vars.HOST }}"
            DEST_PATH: "/home/protected/rungoal"
            # NFSN
            CARGO_BUILD_JOBS: 1
            OPENSSL_DIR: /usr
        steps:
            - name: Clone repo
              uses: actions/checkout@v7.0.0

            #- name: Setup node.js
            #  uses: actions/setup-node@v6.5.0
            #  with:
            #      node-version: "24"

            #- name: Build frontend
            #  working-directory: ui
            #  run: |
            #      npm ci
            #      npm run build

            - name: Configure ssh/rsync
              run: |
                  mkdir -p ~/.ssh
                  printf '%s\n' "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ vars.HOST }} >> ~/.ssh/known_hosts
                  chmod 644 ~/.ssh/known_hosts
                  printf 'Host %s\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_rsa\n  IdentitiesOnly yes\n  StrictHostKeyChecking yes\n' \
                    "${{ vars.HOST }}" "${{ vars.HOST }}" "${{ secrets.USERNAME }}" > ~/.ssh/config
                  chmod 600 ~/.ssh/config

            - name: Deploy
              run: |
                  rsync -avzR --delete \
                  --exclude=".env" --exclude="client_secret.json" --exclude="rungoal.db" --exclude="api/.venv"\
                  ui/dist/ api/ \
                  ${{ vars.HOST }}:$DEST_PATH

            #- name: Refresh Python venv
            #  run: ssh ${{ vars.HOST }} "cd $DEST_PATH/api && ulimit -t 600 && uv sync --frozen --no-dev"

            #- name: Stop backend service
            #  run: nfsn stop-daemon $SERVICE

            #- name: Create/migrate DB
            #  run: ssh $DEST_HOST "cd $DEST_PATH/api && uv run alembic upgrade head"

            #- name: Restart backend service
            #  run: nfsn start-daemon $SERVICE
