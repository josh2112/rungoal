name: Build & Deploy to josh2112.com/rungoal

on:
    # Build when I push to master
    push:
        branches: [master]
    # Build manually (via Actions button)
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment: "josh2112.com (NFSN)"
        env:
            DEST_HOST: "${{ secrets.USERNAME }}@${{ vars.HOST }}"
            DEST_PATH: "/home/protected/rungoal"
        steps:
            - name: Clone repo
              uses: actions/checkout@v7.0.0

            - name: Setup node.js
              uses: actions/setup-node@v6.5.0
              with:
                  node-version: "24"

            - name: Build frontend
              working-directory: ui
              run: |
                  npm ci
                  npm run build

            - name: Configure ssh/rsync
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/key
                  chmod 600 ~/.ssh/key
                  ssh-keyscan -H ${{ vars.HOST }} >> ~/.ssh/known_hosts

            - name: Deploy
              run: |
                  rsync -avzR --delete \
                  --exclude=".vscode/***" --exclude=".git*" \
                  ui/dist/ api/ \
                  $DEST_HOST:$DEST_PATH

            - name: Refresh Python venv
              run: ssh $DEST_HOST "cd $DEST_PATH/api && uv sync --frozen --no-dev"

            #- name: Stop backend service
            #  run: nfsn stop-daemon $SERVICE

            #- name: Create/migrate DB
